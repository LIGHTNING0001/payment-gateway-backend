spring:
  datasource:
    url: jdbc:h2:mem:payment_gateway
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
  servlet:
    context-path: /api/v1

payment:
  alipay:
    app-id: your_alipay_app_id
    private-key: your_alipay_private_key
    public-key: your_alipay_public_key
    notify-url: http://localhost:8080/api/v1/pay/notify
  wechat:
    app-id: your_wechat_app_id
    mch-id: your_wechat_mch_id
    api-key: your_wechat_api_key
    notify-url: http://localhost:8080/api/v1/pay/notify

security:
  rsa2:
    private-key-path: classpath:certificate/RSA2_pri.pfx
    public-key-path: classpath:certificate/RSA2_pub.cer
    private-key-pwd: your_rsa2_password
  cfca:
    private-key-path: classpath:certificate/883007563082_pri.pfx
    public-key-path: classpath:certificate/883007563082_pub.cer
    private-key-pwd: your_cfca_password